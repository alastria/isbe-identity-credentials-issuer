name: Check code
on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  insert-header:
    name: Insert standard header into code files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  
        ref: ${{ github.ref }}
    - name: Insert header
      run: |  
        echo "🚀 >> Inserting standard header into code files..."
        python3 .github/workflows/scripts/insert-header-in-code-files.py
        echo "✅ >> Header insertion completed."
    - name: Commit changes
      run: |
        if [[ -n "$(git status --porcelain)" ]]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: Insert standard header into code files"
          git push origin ${{ github.ref }}
          echo "✅ >> Changes committed and pushed."
        else
          echo "✅ >> No changes to commit."
        fi
