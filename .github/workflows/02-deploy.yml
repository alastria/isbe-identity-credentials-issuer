
name: 2) Deploy
description: Deploy the application to the specified environment on the EKS cluster from image ECR, using the helm deployment (in .helm folder)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Image tag to deploy (from ECR)'
        required: true
        default: latest
        type: string
      environment:
        description: 'GitHub Environment to deploy to'
        required: true
        default: develop
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    steps:

    - name: Check variables and secrets
      run: |
        if [[ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]]; then
          echo "🛑 AWS_ACCESS_KEY_ID is not set in secrets"
          exit 1
        fi
        if [[ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]]; then
          echo "🛑 AWS_SECRET_ACCESS_KEY is not set in secrets"
          exit 1
        fi
        if [[ -z "${{ vars.AWS_REGION }}" ]]; then
          echo "🛑 AWS_REGION is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.APP_NAME }}" ]]; then
          echo "🛑 APP_NAME is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.HOST_NAME }}" ]]; then
          echo "🛑 HOST_NAME is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.EKS_CLUSTER_NAME }}" ]]; then
          echo "🛑 EKS_CLUSTER_NAME is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.EKS_NAMESPACE }}" ]]; then
          echo "🛑 EKS_NAMESPACE is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.ARN_CERT }}" ]]; then
          echo "🛑 ARN_CERT is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.ALLOWED_HOSTS }}" ]]; then
          echo "🛑 ALLOWED_HOSTS is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.BACKEND_DOMAIN }}" ]]; then
          echo "🛑 BACKEND_DOMAIN is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.CSRF_TRUSTED_ORIGINS }}" ]]; then
          echo "🛑 CSRF_TRUSTED_ORIGINS is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.CORS_ALLOWED_ORIGINS }}" ]]; then
          echo "🛑 CORS_ALLOWED_ORIGINS is not set in variables"
          exit 1
        fi
        if [[ -z "${{ secrets.SECRET_KEY }}" ]]; then
          echo "🛑 SECRET_KEY is not set in secrets"
          exit 1
        fi
        if [[ -z "${{ secrets.DATABASE_URL }}" ]]; then
          echo "🛑 DATABASE_URL is not set in secrets"
          exit 1
        fi
        if [[ -z "${{ secrets.POSTMARK_API_KEY }}" ]]; then
          echo "🛑 POSTMARK_API_KEY is not set in secrets"
          exit 1
        fi
        if [[ -z "${{ vars.IDENTFY_CONNECTOR_API_URL }}" ]]; then
          echo "🛑 IDENTFY_CONNECTOR_API_URL is not set in variables"
          exit 1
        fi
        if [[ -z "${{ secrets.IDENTFY_CONNECTOR_API_KEY }}" ]]; then
          echo "🛑 IDENTFY_CONNECTOR_API_KEY is not set in secrets"
          exit 1
        fi
        if [[ -z "${{ vars.TMF_API_URL }}" ]]; then
          echo "🛑 TMF_API_URL is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.KEYCLOAK_JWKS_URI }}" ]]; then
          echo "🛑 KEYCLOAK_JWKS_URI is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.MANAGEMENT_API_URL }}" ]]; then
          echo "🛑 MANAGEMENT_API_URL is not set in variables"
          exit 1
        fi
        if [[ -z "${{ vars.DEFAULT_FROM_EMAIL }}" ]]; then
          echo "🛑 DEFAULT_FROM_EMAIL is not set in variables"  
          exit 1
        fi
        echo "✅ All required variables and secrets are set."
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER_NAME }}

    - name: Normalize image tag
      id: normalize-tag
      env:
        INPUT_IMAGE_TAG: ${{ github.event.inputs.version_tag }}
      run: |
        IMAGE_TAG="${INPUT_IMAGE_TAG}"
        if [[ "${IMAGE_TAG}" == v* ]]; then
          IMAGE_TAG="${IMAGE_TAG#v}"
        fi
        if [[ "${IMAGE_TAG}" == "latest" ]]; then
          IMAGE_TAG="0.0.0-latest"
        fi

        echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
        echo "ℹ️ Input image tag: '${INPUT_IMAGE_TAG}'"
        echo "✅ Deploy image tag: '${IMAGE_TAG}'"

    - name: Pull Helm chart from ECR
      id: pull-helm-chart
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        AWS_REGION: ${{ vars.AWS_REGION }}
        CHART_TAG: ${{ steps.normalize-tag.outputs.image_tag }}
        ECR_REPOSITORY: isbe-helm-charts/${{ vars.APP_NAME }}
      run: |
        echo " > Checking existing Helm chart in ECR..."
        if ! aws ecr describe-images --repository-name "$ECR_REPOSITORY" --image-ids imageTag="$CHART_TAG" >/dev/null 2>&1; then
          echo "❌ Helm chart $ECR_REGISTRY/$ECR_REPOSITORY:$CHART_TAG does not exist in ECR. Aborting deployment."
          exit 1
        fi
        echo "👉🏻 ✅ Helm chart found: $ECR_REGISTRY/$ECR_REPOSITORY:$CHART_TAG"

        echo " > Logging in Helm to OCI registry..."
        aws ecr get-login-password --region "$AWS_REGION" | helm registry login --username AWS --password-stdin "$ECR_REGISTRY"

        echo " > Pulling Helm chart from ECR..."
        WORKDIR="$(mktemp -d)"
        helm pull "oci://$ECR_REGISTRY/$ECR_REPOSITORY" --version "$CHART_TAG" --untar --untardir "$WORKDIR"

        CHART_DIR="$(find "$WORKDIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
        if [[ -z "$CHART_DIR" ]]; then
          echo "❌ Unable to locate extracted Helm chart directory"
          exit 1
        fi

        if [[ ! -f "$CHART_DIR/values.yaml" ]]; then
          echo "❌ values.yaml not found in pulled chart: $CHART_DIR"
          exit 1
        fi

        echo "chart_dir=${CHART_DIR}" >> "$GITHUB_OUTPUT"
        echo "✅ Using pulled Helm chart from: ${CHART_DIR}"

    - name: Deploy to EKS
      env:
        ECR_REPOSITORY: ${{ vars.APP_NAME }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ steps.normalize-tag.outputs.image_tag }}
        CHART_DIR: ${{ steps.pull-helm-chart.outputs.chart_dir }}

        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ vars.AWS_REGION }}
        HOST_NAME: ${{ vars.HOST_NAME }}
        ARN_CERT: ${{ vars.ARN_CERT }}
        EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        APP_NAME: ${{ vars.APP_NAME }}
        ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
        BACKEND_DOMAIN: ${{ vars.BACKEND_DOMAIN }}
        CSRF_TRUSTED_ORIGINS: ${{ vars.CSRF_TRUSTED_ORIGINS }}
        CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        POSTMARK_API_KEY: ${{ secrets.POSTMARK_API_KEY }}
        IDENTFY_CONNECTOR_API_URL: ${{ vars.IDENTFY_CONNECTOR_API_URL }}
        IDENTFY_CONNECTOR_API_KEY: ${{ secrets.IDENTFY_CONNECTOR_API_KEY }}
        TMF_API_URL: ${{ vars.TMF_API_URL }}
        KEYCLOAK_JWKS_URI: ${{ vars.KEYCLOAK_JWKS_URI }}
        MANAGEMENT_API_URL: ${{ vars.MANAGEMENT_API_URL }}
        DEFAULT_FROM_EMAIL: ${{ vars.DEFAULT_FROM_EMAIL }}
      run: |
        echo "🏗️ Environment: ${{ github.event.inputs.environment }}"
        echo "🚀 Desplegando desde rama: ${{ github.ref_name }}"
        echo "📦 App name: ${{ vars.APP_NAME }}"
        echo "🏷️ Image tag: ${{ env.IMAGE_TAG }}"
        echo "🏷️ EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}"
        echo "🏷️ EKS_NAMESPACE: ${{ vars.EKS_NAMESPACE }}"
        echo "🏷️ ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}"
        echo "🏷️ ECR_REGISTRY: ${{ env.ECR_REGISTRY }}"

        echo " > Check existing image in ECR..."
        if ! aws ecr describe-images --repository-name $ECR_REPOSITORY --image-ids imageTag=$IMAGE_TAG >/dev/null 2>&1; then
          echo "❌ Image $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG does not exist in ECR. Aborting deployment."
          exit 1
        fi
        echo "👉🏻 ✅ Image $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG "

        # Install or Update Helm chart values with the correct image details
        echo " > Installing or Updating Helm chart with image details..."

        envsubst < "$CHART_DIR/values.yaml" | helm template "$CHART_DIR" --debug --values -

        echo " > Checking if deployment exists... (for example: sh.helm.release.v1.${{ vars.APP_NAME }}.v1)"
        if kubectl -n ${{ vars.EKS_NAMESPACE }} get secrets | grep ${{ vars.APP_NAME }}.v; then 
          echo " > Deployment exists."
          echo " > Updating Helm chart values with image details..."
          envsubst < "$CHART_DIR/values.yaml" | helm upgrade ${{ vars.APP_NAME }} "$CHART_DIR" --namespace ${{ vars.EKS_NAMESPACE }} --create-namespace --values -
          # Force restart pods to pick up new environment variables from updated secrets/configmaps
          echo " > Restarting pods to pick up new environment variables..."
          kubectl -n ${{ vars.EKS_NAMESPACE }} rollout restart deployment ${{ vars.APP_NAME }}
        else
          echo " > Deployment does not exist."
          echo " > Installing Helm chart with image details..."
          envsubst < "$CHART_DIR/values.yaml" | helm install ${{ vars.APP_NAME }} "$CHART_DIR" --debug --namespace ${{ vars.EKS_NAMESPACE }} --create-namespace --values -
        fi

        #kubectl -n ${{ vars.EKS_NAMESPACE }} get pods -l app.kubernetes.io/name=${{ vars.APP_NAME }}
        #if kubectl -n ${{ vars.EKS_NAMESPACE }} get pods -l app.kubernetes.io/name=${{ vars.APP_NAME }} 2>&1 | grep -q "No resources found"; then
        #  
        #else
        #  
        #fi

        echo " > Verifying deployment..."
        kubectl -n ${{ vars.EKS_NAMESPACE }} get pods

        echo " > Getting last deployed pod ID"
        LAST_POD=$(kubectl -n ${{ vars.EKS_NAMESPACE }} get pods -l app.kubernetes.io/name=${{ vars.APP_NAME }} -o custom-columns=creationTimestamp:.metadata.creationTimestamp,PodName:.metadata.name --no-headers | sort -k1 | tail -n 1 | awk '{print $2}')
        echo "Last deployed pod $LAST_POD"
        echo " > Waiting for pod to be ready"
        OUT=$(kubectl -n ${{ vars.EKS_NAMESPACE }} wait --for=condition=ready pod/$LAST_POD --timeout=30s) || true
        echo "$OUT" | grep -q 'condition met' || {
          echo " > Getting NEW LAST deployed pod ID";
          LAST_POD_2=$(kubectl -n ${{ vars.EKS_NAMESPACE }} get pods -l app.kubernetes.io/name=${{ vars.APP_NAME }} -o custom-columns=creationTimestamp:.metadata.creationTimestamp,PodName:.metadata.name --no-headers | sort -k1 | tail -n 1 | awk '{print $2}');
          echo " > Getting pod logs $LAST_POD_2";
          echo $(kubectl -n ${{ vars.EKS_NAMESPACE }} logs $LAST_POD_2);
          echo "❌ Pod $LAST_POD is not ready after 30 seconds";
        }
        kubectl -n ${{ vars.EKS_NAMESPACE }} get pods
        LAST_POD=$(kubectl -n ${{ vars.EKS_NAMESPACE }} get pods -l app.kubernetes.io/name=${{ vars.APP_NAME }} -o custom-columns=creationTimestamp:.metadata.creationTimestamp,PodName:.metadata.name --no-headers | sort -k1 | tail -n 1 | awk '{print $2}')
        echo " > Describing pod $LAST_POD"
        kubectl -n ${{ vars.EKS_NAMESPACE }} describe pod $LAST_POD
        POD_STATUS=$(kubectl -n ${{ vars.EKS_NAMESPACE }} get pod $LAST_POD --no-headers | awk '{print $3}')
        if [ "$POD_STATUS" != "Running" ]; then
          echo " > Getting pod logs";
          echo $(kubectl -n ${{ vars.EKS_NAMESPACE }} logs $LAST_POD);
          echo "❌ Pod $LAST_POD is not running (status $POD_STATUS)";
          echo "❌ DEPLOYED ERROR.";
          az logout
          exit 1;
        fi
        echo "👉🏻 ✅ DEPLOYED SUCCESSFULLY to EKS cluster ${{ vars.EKS_CLUSTER_NAME }} in namespace ${{ vars.EKS_NAMESPACE }} using image $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "👉🏻 ✅  Visit https://${{ vars.HOST_NAME }} to see your application"
