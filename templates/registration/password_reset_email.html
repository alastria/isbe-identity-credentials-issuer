{% load i18n %}{% autoescape off %}
<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <style type="text/css">
        body {
            font-family: "muli"; 
        }
        .email {
            color: #252525;
            max-width: 700px;
            margin: 5vh auto;
            margin-left: 2vh;
            margin-right: 2vh;
        }
        .title {
            font-size: 20px;
            line-height: 20px;
            color: #252525;
            font-weight: 400;
            max-width: 600px;
            margin-left: 50px;
            padding-top: 15px;
            text-align: left;
            line-height: 1.6;
        }
        .title_center {
            font-size: 20px;
            line-height: 20px;
            color: #252525;
            font-weight: 400;
            max-width: 650px;
            margin-left: 25px;
            margin-right: 25px;
            padding-top: 15px;
            text-align: -webkit-center;
            line-height: 1.6;
        }
        .message {
            margin-top: 30px !important;
            padding-left: 5px;
            font-size: 16px;
            line-height: 20px;
            font-weight: 400;
            color: #252525;
            text-align: justify;
        }
        .button {
            margin-top: 40px;
            margin-left: 2vh;
            max-width: 400px;
            display: block;
            height: 25px;
            background: #2b2a2a;
            padding-top: 10px;
            padding-bottom: 10px;
            text-align: center;
            color: #ffffff !important;
            line-height: 25px;
            text-decoration-color: #ffffff !important;
            border-radius: 20px;
            font-size: 1.0rem;
        }
        .button:hover {
            background: #000000;
        }
        .image-container {
            max-width: 650px;
            text-align: center;
        }
        .image {
            margin-top: 32px;
            margin-left: 32px;
            height: 30px;
            opacity: .8;
        }
        .link {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        .link:hover {
            text-decoration: underline;
        }
        .link:visited {
            color: #ffffff;
        }

    </style>
</head>
<body>
    <div class="email">
      <p class="title_center">{% trans "Change Password" %}</p>
      <p class="message">{{message_reset}}</p>
      <p class="message">{{message_expire_time}}</p>
      <br />
      
      {% block reset_link %}
      <a href="{{protocol}}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" class="button link">{% trans "Password Reset" %}</a>
      {% endblock %}
  
</body>
</html>
{% endautoescape %}
